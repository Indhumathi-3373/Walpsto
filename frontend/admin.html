<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="ui.css">
    <link rel="stylesheet" href="Admin.css">
</head>
<body class="auth-page">
    <main class="auth-card surface">
        <div class="auth-header">
            <p class="label">Secure Access</p>
            <h1 class="auth-title">Admin Login</h1>
            <p class="subtitle">Manage and review platform activity.</p>
        </div>
        <div class="auth-form">
            <label class="label" for="email">Email</label>
            <input type="email" id="email" class="input" placeholder="Enter email" name="Email :" value="">
            <label class="label" for="password">Password</label>
            <input type="password" id="password" class="input" placeholder="Enter password" name="password" value="">
            <button type="button" id="submit" class="btn btn-primary">Submit</button>
        </div>
    </main>
    <script src="admin.js"></script>
</body>
</html>
