<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walpsto | Document Login</title>
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Cdefs%3E%3ClinearGradient id="g" x1="0%25" y1="0%25" x2="100%25" y2="100%25"%3E%3Cstop offset="0%25" stop-color="%230d1b2a"/%3E%3Cstop offset="100%25" stop-color="%23b8893d"/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width="64" height="64" rx="18" fill="url(%23g)"/%3E%3Ccircle cx="32" cy="22" r="8" fill="%23f7edd9"/%3E%3Cpath d="M19 45c4-8 8-12 13-12s9 4 13 12" fill="none" stroke="%23f7edd9" stroke-width="5" stroke-linecap="round"/%3E%3C/svg%3E'>
    <meta name="api-base" content="https://walpsto.onrender.com">
    <link rel="stylesheet" href="ui.css">
    <link rel="stylesheet" href="stylelogin1.css">
</head>
<body class="auth-page">
    <main class="auth-card surface">
        <div class="auth-header">
            <p class="label">Document Access</p>
            <h1 class="auth-title">Preserve Your Legacy</h1>
            <p class="subtitle">Log in to manage your documents.</p>
        </div>
        <form id="formid" class="auth-form" method="POST" action="/frontend/loginfordocument">
            <label class="label" for="email2">Email</label>
            <input id="email2" type="email" class="input" placeholder="Enter your email" name="Email :" value="">
            <div id="error">please enter valid email</div>
            <label class="label" for="input1">Password</label>
            <input id="input1" type="password" class="input" placeholder="Enter your password" name="password :" value="">
            <div id="error1">password must be atleast 6 characters</div>
            <div class="auth-actions">
                <button id="f_btn" type="button" class="btn btn-ghost">Forgot Password?</button>
                <button id="l_sub" type="submit" class="btn btn-primary">Login</button>
            </div>
            <p class="auth-footer">Don't have an account? <a href="create_account.html" class="c_btn">Create Account</a></p>
        </form>
        <script src="./login_for_document.js"></script>
    </main>
</body>
</html>
