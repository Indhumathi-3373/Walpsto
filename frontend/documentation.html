<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walpsto | Documents</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Cdefs%3E%3ClinearGradient id="g" x1="0%25" y1="0%25" x2="100%25" y2="100%25"%3E%3Cstop offset="0%25" stop-color="%230d1b2a"/%3E%3Cstop offset="100%25" stop-color="%23b8893d"/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width="64" height="64" rx="18" fill="url(%23g)"/%3E%3Ccircle cx="32" cy="22" r="8" fill="%23f7edd9"/%3E%3Cpath d="M19 45c4-8 8-12 13-12s9 4 13 12" fill="none" stroke="%23f7edd9" stroke-width="5" stroke-linecap="round"/%3E%3C/svg%3E'>
  <meta name="api-base" content="https://walpsto.onrender.com">
  <link rel="stylesheet" href="ui.css">
  <link rel="stylesheet" href="documentation.css">
</head>
<body class="docs-page">
  <header class="docs-header">
    <div class="container header-grid">
      <div class="brand">
        <span class="brand-mark">W</span>
        <span class="brand-name">Walpsto Vault</span>
      </div>
      <p class="page-quote">Keep it secret. Make it perfect.</p>
      <div class="menu">
        <button id="menu-button" class="btn btn-ghost" type="button">Menu</button>
        <div id="dropdown" class="dropdown hidden">
          <a href="index.html">Home</a>
          <a href="index.html#section2">About us</a>
          <a id="logout-link" href="#">Logout</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container docs-main">
    <div class="docs-toolbar">
      <div class="toolbar-title">Your files</div>
      <button id="plus" class="btn btn-primary" type="button">Add file</button>
    </div>

    <div id="files" class="file-grid" name="files"></div>
  </main>

  <script src="files.js"></script>
  <script>
    function getApiBase() {
      const meta = document.querySelector('meta[name="api-base"]');
      const raw = meta && meta.content ? meta.content.trim() : "";
      const cleaned = raw ? raw.replace(/\/$/, "") : "";
      if (cleaned) return cleaned;
      if (window.location.protocol === "http:" || window.location.protocol === "https:") {
        return window.location.origin;
      }
      return "";
    }
    const logoutLink = document.getElementById("logout-link");
    if (logoutLink) {
      logoutLink.addEventListener("click", (e) => {
        e.preventDefault();
        const apiBase = getApiBase();
        if (!apiBase) {
          window.location.href = "index.html";
          return;
        }
        fetch(`${apiBase}/frontend/logout?scope=document`, { method: "POST", credentials: "include" })
          .finally(() => {
            window.location.href = "index.html";
          });
      });
    }
  </script>
</body>
</html>
