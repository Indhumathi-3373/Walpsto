<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walpsto | Create Account</title>
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Cdefs%3E%3ClinearGradient id="g" x1="0%25" y1="0%25" x2="100%25" y2="100%25"%3E%3Cstop offset="0%25" stop-color="%230d1b2a"/%3E%3Cstop offset="100%25" stop-color="%23b8893d"/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width="64" height="64" rx="18" fill="url(%23g)"/%3E%3Ccircle cx="32" cy="22" r="8" fill="%23f7edd9"/%3E%3Cpath d="M19 45c4-8 8-12 13-12s9 4 13 12" fill="none" stroke="%23f7edd9" stroke-width="5" stroke-linecap="round"/%3E%3C/svg%3E'>
    <meta name="api-base" content="https://walpsto.onrender.com">
    <link rel="stylesheet" href="ui.css">
    <link rel="stylesheet" href="create.css">
</head>
<body class="auth-page">
    <main class="auth-card surface">
        <div class="auth-header">
            <p class="label">New Account</p>
            <h1 class="auth-title">Create Account</h1>
            <p class="subtitle">Set up credentials for both diary and documents.</p>
        </div>
        <form id="form" class="auth-form" action="/frontend/create_account" method="POST">
            <label class="label" for="email">Email</label>
            <input id="email" type="email" class="input" placeholder="Enter your email" name="Email :" value="">
            <label class="label" for="password_diary">Diary Password</label>
            <input id="password_diary" type="password" class="input" placeholder="Password for diary" name="Diary password:" value="">
            <label class="label" for="password_doc">Document Password</label>
            <input id="password_doc" type="password" class="input" placeholder="Password for document" name="doc password:" value="">
            <button id="btn1" class="btn btn-primary" type="submit">Create Account</button>
        </form>
    </main>
    <script src="./createaccount.js"></script>
</body>
</html>
