<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Walpsto | Diary</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Cdefs%3E%3ClinearGradient id="g" x1="0%25" y1="0%25" x2="100%25" y2="100%25"%3E%3Cstop offset="0%25" stop-color="%230d1b2a"/%3E%3Cstop offset="100%25" stop-color="%23b8893d"/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width="64" height="64" rx="18" fill="url(%23g)"/%3E%3Ccircle cx="32" cy="22" r="8" fill="%23f7edd9"/%3E%3Cpath d="M19 45c4-8 8-12 13-12s9 4 13 12" fill="none" stroke="%23f7edd9" stroke-width="5" stroke-linecap="round"/%3E%3C/svg%3E'>
  <meta name="api-base" content="https://walpsto.onrender.com">
  <link rel="stylesheet" href="ui.css">
  <link rel="stylesheet" href="diary.css">
</head>

<body class="diary-page">
  <header class="diary-header">
    <div class="container header-grid">
      <div class="brand">
        <span class="brand-mark">W</span>
        <span class="brand-name">Walpsto Diary</span>
      </div>
      <p class="page-quote">This is the place where silence speaks.</p>
      <div class="menu">
        <button class="menu-btn" type="button">&#9776;</button>
        <div class="menu-panel">
          <a href="index.html">Home</a>
          <a href="index.html#section2">About Us</a>
          <a id="logout-link" href="#">Logout</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container diary-main">
    <section class="entry-list">
      <div id="subcard" class="entry-grid"></div>
    </section>
  </main>

  <div id="cards" class="editor-overlay">
    <div class="editor surface">
      <div class="editor-header">
        <div class="field">
          <label class="label" for="date">Date</label>
          <input type="date" id="date" name="date" class="input">
        </div>
        <div class="field">
          <label class="label" for="day">Day</label>
          <select name="days" id="day" class="select">
            <option value="sunday">Sunday</option>
            <option value="monday">Monday</option>
            <option value="tuesday">Tuesday</option>
            <option value="wednesday">Wednesday</option>
            <option value="thursday">Thursday</option>
            <option value="friday">Friday</option>
            <option value="saturday">Saturday</option>
          </select>
        </div>
      </div>
      <textarea id="content" class="textarea" placeholder="Start writing..." name="textarea input"></textarea>
      <div class="editor-actions">
        <button id="close" class="btn btn-ghost" type="button">Cancel</button>
        <button id="save" class="btn btn-primary" type="button">Save</button>
      </div>
    </div>
  </div>

  <button class="add-btn" type="button">+</button>
  <script src="./subcard.js"></script>
  <script>
    const menu = document.querySelector(".menu");
    const menuBtn = document.querySelector(".menu-btn");
    const menuPanel = document.querySelector(".menu-panel");
    function getApiBase() {
      const meta = document.querySelector('meta[name="api-base"]');
      const raw = meta && meta.content ? meta.content.trim() : "";
      const cleaned = raw ? raw.replace(/\/$/, "") : "";
      if (cleaned) return cleaned;
      if (window.location.protocol === "http:" || window.location.protocol === "https:") {
        return window.location.origin;
      }
      return "";
    }

    if (menuBtn && menuPanel) {
      menuBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        menu.classList.toggle("open");
      });

      document.addEventListener("click", (e) => {
        if (!menu.contains(e.target)) {
          menu.classList.remove("open");
        }
      });
    }

    const logoutLink = document.getElementById("logout-link");
    if (logoutLink) {
      logoutLink.addEventListener("click", (e) => {
        e.preventDefault();
        const apiBase = getApiBase();
        if (!apiBase) {
          window.location.href = "index.html";
          return;
        }
        fetch(`${apiBase}/frontend/logout?scope=diary`, { method: "POST", credentials: "include" })
          .finally(() => {
            window.location.href = "index.html";
          });
      });
    }
  </script>
</body>

</html>
